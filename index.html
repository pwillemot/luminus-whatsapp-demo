<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="WhatsApp"/>
<title>WhatsApp</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Chat list screen -->
<div id="screen-list" class="screen active">
  <div class="wa-header">
    <span class="wa-header-title">WhatsApp</span>
    <div class="wa-header-icons">
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="wa-tabs">
    <span class="wa-tab">All</span>
    <span class="wa-tab active">Unread</span>
    <span class="wa-tab">Groups</span>
  </div>

  <div class="wa-chat-list">
    <!-- Luminus chat row -->
    <div class="wa-chat-row" onclick="openChat()">
      <div class="wa-avatar luminus-avatar">
        <img src="sarah-avatar.jpg" alt="Sarah" onerror="this.style.display='none';this.parentElement.classList.add('avatar-fallback')"/>
      </div>
      <div class="wa-chat-info">
        <div class="wa-chat-top">
          <span class="wa-chat-name">Sarah - Luminus ⚡</span>
          <span class="wa-chat-time" id="list-time"></span>
        </div>
        <div class="wa-chat-bottom">
          <span class="wa-chat-preview">Hi there! Welcome to Luminus 👋</span>
          <span class="wa-unread-badge">1</span>
        </div>
      </div>
    </div>

    <!-- Filler chats for realism -->
    <div class="wa-chat-row filler">
      <div class="wa-avatar" style="background:#d1a3ff;">M</div>
      <div class="wa-chat-info">
        <div class="wa-chat-top"><span class="wa-chat-name">Mama</span><span class="wa-chat-time">Yesterday</span></div>
        <div class="wa-chat-bottom"><span class="wa-chat-preview">✓✓ Dinner Sunday?</span></div>
      </div>
    </div>
    <div class="wa-chat-row filler">
      <div class="wa-avatar" style="background:#a3d1ff;">W</div>
      <div class="wa-chat-info">
        <div class="wa-chat-top"><span class="wa-chat-name">Work Team</span><span class="wa-chat-time">Mon</span></div>
        <div class="wa-chat-bottom"><span class="wa-chat-preview">📎 Q2 report.pdf</span></div>
      </div>
    </div>
    <div class="wa-chat-row filler">
      <div class="wa-avatar" style="background:#a3ffd1;">J</div>
      <div class="wa-chat-info">
        <div class="wa-chat-top"><span class="wa-chat-name">Jan</span><span class="wa-chat-time">Mon</span></div>
        <div class="wa-chat-bottom"><span class="wa-chat-preview">✓ Ok cool 👍</span></div>
      </div>
    </div>
  </div>

  <div class="wa-fab" onclick="openChat()">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </div>
</div>

<!-- Chat conversation screen -->
<div id="screen-chat" class="screen">
  <div class="wa-chat-header">
    <button class="wa-back-btn" onclick="closeChat()">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <div class="wa-avatar small luminus-avatar">
      <img src="sarah-avatar.jpg" alt="Sarah" onerror="this.style.display='none';this.parentElement.classList.add('avatar-fallback')"/>
    </div>
    <div class="wa-chat-header-info" onclick="void(0)">
      <span class="wa-chat-header-name">Sarah - Luminus ⚡</span>
      <span class="wa-chat-header-status" id="agent-status">online</span>
    </div>
    <div class="wa-chat-header-icons">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.5 16z"/></svg>
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="wa-messages" id="messages"></div>

  <div class="wa-input-bar" id="input-bar">
    <div class="wa-input-wrap">
      <svg class="wa-emoji-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8b9398" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <input type="text" id="chat-input" placeholder="Message" autocomplete="off" onkeydown="handleKey(event)"/>
      <svg class="wa-attach-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8b9398" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </div>
    <button class="wa-send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
